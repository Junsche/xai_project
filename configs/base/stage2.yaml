# configs/_base-comparison.yaml
seed: 1437
device: "cuda"

data:
  batch_size: 128          # Keep consistent with Stage-1
  num_workers: 4
  use_val_split: false     # Stage-2: no validation split; evaluation uses test-like split
  val_split_ratio: 0.1     # Kept for schema consistency (not used here)

train:
  epochs: 100              # Longer training for Stage-2 comparisons
  lr: 0.1                  # Placeholder; overridden via --override train.lr=...
  optimizer: "sgd"
  momentum: 0.9
  weight_decay: 5e-4
  exp_id: "S2_default"     # Placeholder; overridden by comparison runner

early_stopping:
  enabled: false           # Early stopping is always disabled in Stage-2
  monitor: "val_acc"
  mode: "max"
  patience: 5
  min_delta: 0.001

model:
  name: "resnet18"
  num_classes: 10          # Placeholder; overridden by dataset config
  weights: imagenet1k_v1

log:
  out_dir: "./runs"

eval:
  do_ece: true
  do_bal_acc: false        # Enabled explicitly only for medical datasets
  # do_cifar_c: false      # Can be added later if needed

wandb:
  project: "stage2-aug-comparison"
  group: "TBD"
  tags: []